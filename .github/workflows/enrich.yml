name: Candidate Enrichment Pipeline

on:
  # Run manually from the Actions tab
  workflow_dispatch:
    inputs:
      enrich_all:
        description: 'Re-enrich candidates that already have stances'
        type: boolean
        default: false
      dry_run:
        description: 'Dry run — print output only, no DB writes'
        type: boolean
        default: false

  # Run automatically every Sunday at 02:00 UTC
  schedule:
    - cron: '0 2 * * 0'

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: pipeline/requirements.txt

      - name: Install Python dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Run enrichment pipeline
        working-directory: pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          ENRICH_ALL_OVERRIDE: ${{ inputs.enrich_all || 'false' }}
          DRY_RUN_OVERRIDE: ${{ inputs.dry_run || 'false' }}
        run: python scraper.py
